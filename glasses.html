<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="naver-site-verification" content="35573eab2fd7395dd0b798edd6df59d03e51b77e" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안경 브랜드 | 불란서 안경 콘택트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.brand-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1.2rem; max-width: 1100px; margin: 0 auto;
}
.brand-card {
  background: var(--white); border: 1px solid var(--beige);
  border-radius: 16px; overflow: hidden;
  transition: all 0.4s ease; cursor: pointer;
  position: relative;
}
.brand-card::before {
  content: ''; position: absolute; top:0; left:0; right:0;
  height: 3px; z-index: 2;
  background: linear-gradient(90deg, var(--warm-gold), var(--gold-pale));
  transform: scaleX(0); transition: transform 0.4s;
}
.brand-card:hover::before { transform: scaleX(1); }
.brand-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.06); border-color: var(--gold-pale); }

.brand-card.premium { background: var(--charcoal); border-color: var(--charcoal); }
.brand-card.premium:hover { background: var(--brown-dark); }
.brand-card.premium .brand-info h3 { color: var(--white); }
.brand-card.premium .brand-origin { color: rgba(255,255,255,0.4); }
.brand-card.premium .brand-icon-wrap { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }

.brand-img {
  width: 100%; aspect-ratio: 1;
  overflow: hidden; background: var(--cream);
  display: flex; align-items: center; justify-content: center;
}
.brand-card.premium .brand-img { background: rgba(255,255,255,0.05); }
.brand-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.brand-card:hover .brand-img img { transform: scale(1.05); }
.brand-icon-wrap {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--cream); border: 1px solid var(--beige);
  display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
}
.brand-info { padding: 1.2rem; text-align: center; }
.brand-info h3 { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--charcoal); margin-bottom: 0.2rem; }
.brand-origin { font-size: 0.72rem; color: var(--text-light); letter-spacing: 1px; }
.brand-view { font-size: 0.7rem; color: var(--warm-gold); margin-top: 0.5rem; letter-spacing: 1px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
  display: none; align-items: center; justify-content: center;
  padding: 2rem;
}
.modal-overlay.active { display: flex; }

.modal {
  background: var(--white); border-radius: 20px;
  max-width: 800px; width: 100%; max-height: 85vh;
  overflow-y: auto; position: relative;
  animation: modalIn 0.3s ease;
}
@keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(20px); } to { opacity:1; transform: scale(1) translateY(0); } }

.modal-close {
  position: absolute; top: 1rem; right: 1rem;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--cream); border: 1px solid var(--beige);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; color: var(--brown-soft);
  transition: all 0.3s; z-index: 10;
}
.modal-close:hover { background: var(--charcoal); color: white; }

.modal-header {
  padding: 2.5rem 2.5rem 1.5rem;
  border-bottom: 1px solid var(--beige);
  display: flex; gap: 1.5rem; align-items: center;
}
.modal-brand-img {
  width: 80px; height: 80px; border-radius: 16px;
  background: var(--cream); overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.modal-brand-img img { width: 100%; height: 100%; object-fit: cover; }
.modal-brand-img .icon { font-size: 2rem; }
.modal-header-text h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 0.2rem; }
.modal-header-text .kr { color: var(--warm-gold); font-size: 0.85rem; font-weight: 500; }
.modal-header-text p { color: var(--text-light); font-size: 0.85rem; margin-top: 0.5rem; line-height: 1.6; }

.modal-body { padding: 2rem 2.5rem 2.5rem; }
.modal-body h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 1.2rem; color: var(--charcoal); }

.product-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
}
.product-card {
  background: var(--cream); border: 1px solid var(--beige);
  border-radius: 12px; overflow: hidden; transition: all 0.3s;
}
.product-card:hover { border-color: var(--gold-pale); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.product-card-img {
  width: 100%; aspect-ratio: 1; background: var(--warm-white);
  overflow: hidden; display: flex; align-items: center; justify-content: center;
}
.product-card-img img { width: 100%; height: 100%; object-fit: cover; }
.product-card-img .placeholder { font-size: 2rem; opacity: 0.3; }
.product-card-info { padding: 0.8rem; text-align: center; }
.product-card-info h4 { font-size: 0.82rem; color: var(--charcoal); margin-bottom: 0.2rem; }
.product-card-info .price { font-size: 0.78rem; color: var(--warm-gold); font-weight: 500; }
.product-card-info .desc { font-size: 0.72rem; color: var(--text-light); margin-top: 0.2rem; }

.no-products {
  text-align: center; padding: 3rem; color: var(--text-light);
  font-size: 0.9rem; line-height: 1.8;
}

/* Loading */
.loading-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1.2rem; max-width: 1100px; margin: 0 auto;
}
.loading-item {
  aspect-ratio: 0.8; border-radius: 16px;
  background: linear-gradient(110deg, var(--beige) 30%, var(--warm-white) 50%, var(--beige) 70%);
  background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.cta-section { background: var(--white); text-align: center; }
.cta-box { max-width: 600px; margin: 0 auto; padding: 3rem; background: var(--cream); border-radius: 20px; border: 1px solid var(--beige); }
.cta-box p { color: var(--text-light); margin-bottom: 1.5rem; font-size: 0.9rem; line-height: 1.8; }

@media (max-width:900px) {
  .brand-grid, .loading-grid { grid-template-columns: repeat(2, 1fr); }
  .product-grid { grid-template-columns: repeat(2, 1fr); }
  .modal { margin: 1rem; }
  .modal-header { padding: 1.5rem; flex-direction: column; text-align: center; }
  .modal-body { padding: 1.5rem; }
}
</style>
</head>
<body>
<nav class="nav" id="nav">
  <a href="index.html" class="nav-logo"><span class="nav-logo-main">불란서 안경 콘택트</span><span class="nav-logo-sub">France Optical &amp; Contact</span></a>
  <button class="nav-toggle" id="navToggle" aria-label="메뉴"><span></span><span></span><span></span></button>
  <ul class="nav-links" id="navLinks">
    <li><a href="about.html">소개</a></li>
    <li><a href="glasses.html" class="active">안경</a></li>
    <li><a href="lens.html">렌즈</a></li>
    <li><a href="instagram.html">인스타그램</a></li>
    <li><a href="contact.html">오시는 길</a></li>
  </ul>
</nav>

<div class="page-hero">
  <p class="section-label">Eyewear Brands</p>
  <h1 class="section-title">안경 브랜드</h1>
  <div class="divider"></div>
  <p class="section-subtitle">세계적인 명품부터 감각적인 디자인 브랜드까지<br>다양한 안경 브랜드를 만나보세요</p>
</div>

<section style="background:var(--cream);">
  <div class="loading-grid" id="loadingGrid">
    <div class="loading-item"></div><div class="loading-item"></div><div class="loading-item"></div><div class="loading-item"></div>
    <div class="loading-item"></div><div class="loading-item"></div><div class="loading-item"></div><div class="loading-item"></div>
  </div>
  <div class="brand-grid" id="brandGrid" style="display:none;"></div>
</section>

<section class="cta-section">
  <div class="cta-box reveal">
    <p>원하시는 브랜드가 있으시면 언제든 문의해 주세요.<br>매장에서 직접 착용해보시고 나에게 맞는 안경을 찾아보세요.</p>
    <a href="contact.html" class="btn btn-primary">매장 방문하기 →</a>
  </div>
</section>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<footer class="footer">
  <div class="footer-logo">불란서 안경 콘택트</div>
  <div class="footer-links">
    <a href="about.html">소개</a><a href="glasses.html">안경</a><a href="lens.html">렌즈</a><a href="contact.html">오시는 길</a>
  </div>
  <p class="footer-copy">&copy; 2026 France Optical &amp; Contact.</p>
</footer>

<script>
let brandsData = [];

async function loadBrands() {
  const grid = document.getElementById('brandGrid');
  const loading = document.getElementById('loadingGrid');
  try {
    const res = await fetch('data/glasses.json');
    const data = await res.json();
    brandsData = data.brands;
    grid.innerHTML = '';
    data.brands.forEach((brand, idx) => {
      const hasImage = brand.image && brand.image.trim() !== '';
      const card = document.createElement('div');
      card.className = `brand-card${brand.premium ? ' premium' : ''} reveal`;
      card.dataset.index = idx;
      card.innerHTML = `
        <div class="brand-img">
          ${hasImage ? `<img src="${brand.image}" alt="${brand.name}" loading="lazy">` : `<div class="brand-icon-wrap">👓</div>`}
        </div>
        <div class="brand-info">
          <h3>${brand.name}</h3>
          <span class="brand-origin">${brand.name_kr}</span>
          <div class="brand-view">자세히 보기 →</div>
        </div>
      `;
      card.addEventListener('click', () => openModal(idx));
      grid.appendChild(card);
    });
    loading.style.display = 'none';
    grid.style.display = 'grid';
    grid.querySelectorAll('.reveal').forEach(el =>
      new IntersectionObserver(e => e.forEach(el => { if (el.isIntersecting) el.target.classList.add('visible'); }), { threshold: 0.1 }).observe(el)
    );
  } catch (err) {
    console.error('데이터 로드 실패:', err);
    loading.innerHTML = '<p style="text-align:center;color:var(--text-light);grid-column:1/-1;padding:3rem;">데이터를 불러오는 중 오류가 발생했습니다.</p>';
  }
}

function openModal(idx) {
  const brand = brandsData[idx];
  const hasImage = brand.image && brand.image.trim() !== '';
  const overlay = document.getElementById('modalOverlay');
  const header = document.getElementById('modalHeader');
  const body = document.getElementById('modalBody');

  header.innerHTML = `
    <div class="modal-brand-img">
      ${hasImage ? `<img src="${brand.image}" alt="${brand.name}">` : `<span class="icon">👓</span>`}
    </div>
    <div class="modal-header-text">
      <h2>${brand.name}</h2>
      <span class="kr">${brand.name_kr}</span>
      ${brand.description ? `<p>${brand.description}</p>` : ''}
    </div>
  `;

  const products = brand.products || [];
  if (products.length > 0) {
    body.innerHTML = `
      <h3>제품 목록</h3>
      <div class="product-grid">
        ${products.map(p => `
          <div class="product-card">
            <div class="product-card-img">
              ${p.product_image ? `<img src="${p.product_image}" alt="${p.product_name}" loading="lazy">` : `<span class="placeholder">👓</span>`}
            </div>
            <div class="product-card-info">
              <h4>${p.product_name}</h4>
              ${p.product_price ? `<span class="price">${p.product_price}</span>` : ''}
              ${p.product_desc ? `<span class="desc">${p.product_desc}</span>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  } else {
    body.innerHTML = `
      <div class="no-products">
        아직 등록된 제품이 없습니다.<br>
        매장을 방문하시면 다양한 제품을 직접 확인하실 수 있습니다.
      </div>
    `;
  }

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

// Close modal
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

loadBrands();

// Nav
const toggle=document.getElementById('navToggle'),links=document.getElementById('navLinks');
toggle.addEventListener('click',()=>links.classList.toggle('open'));
links.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>links.classList.remove('open')));
document.querySelectorAll('.reveal').forEach(el=>new IntersectionObserver(e=>e.forEach(el=>{if(el.isIntersecting)el.target.classList.add('visible')}),{threshold:0.12}).observe(el));
</script>
</body>
</html>
