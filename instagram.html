<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="naver-site-verification" content="35573eab2fd7395dd0b798edd6df59d03e51b77e" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인스타그램 | 불란서 안경 콘택트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
/* Behold widget container */
.behold-container {
  max-width: 1000px;
  margin: 0 auto 3rem;
}

/* Behold 위젯 4열 강제 */
behold-widget {
  --bw-grid-columns: 4 !important;
  --bw-gap: 10px !important;
}

/* Profile */
.insta-profile { text-align: center; max-width: 500px; margin: 0 auto; }
.profile-avatar {
  width: 90px; height: 90px; border-radius: 50%;
  background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  padding: 3px; margin: 0 auto 1.2rem;
}
.profile-avatar-inner {
  width: 100%; height: 100%; border-radius: 50%;
  background: var(--cream);
  display: flex; align-items: center; justify-content: center; font-size: 2rem;
}
.insta-handle { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--charcoal); margin-bottom: 0.3rem; }
.insta-handle a { color: var(--charcoal); text-decoration: none; transition: color 0.3s; }
.insta-handle a:hover { color: var(--warm-gold); }
.insta-bio { color: var(--text-light); font-size: 0.9rem; line-height: 1.7; margin-bottom: 1.8rem; }
.insta-follow-btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.8rem 2.2rem;
  background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  color: white; border-radius: 100px; font-size: 0.85rem;
  letter-spacing: 1px; font-weight: 500; transition: all 0.3s; text-decoration: none;
}
.insta-follow-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(225,48,108,0.3); }
</style>
</head>
<body>
<nav class="nav" id="nav">
  <a href="index.html" class="nav-logo"><span class="nav-logo-main">불란서 안경 콘택트</span><span class="nav-logo-sub">France Optical &amp; Contact</span></a>
  <button class="nav-toggle" id="navToggle" aria-label="메뉴"><span></span><span></span><span></span></button>
  <ul class="nav-links" id="navLinks">
    <li><a href="about.html">소개</a></li>
    <li><a href="glasses.html">안경</a></li>
    <li><a href="lens.html">렌즈</a></li>
    <li><a href="instagram.html" class="active">인스타그램</a></li>
    <li><a href="contact.html">오시는 길</a></li>
  </ul>
</nav>

<div class="page-hero">
  <p class="section-label">Instagram</p>
  <h1 class="section-title">인스타그램</h1>
  <div class="divider"></div>
  <p class="section-subtitle">불란서 안경 콘택트의 일상과 새로운 소식을 만나보세요</p>
</div>

<section style="background:var(--cream);">
  <!-- Behold 인스타그램 피드 -->
  <div class="behold-container reveal">
    <behold-widget feed-id="duuwe9sAqXXpRcYwmutB"></behold-widget>
  </div>

  <!-- Profile -->
  <div class="insta-profile reveal">
    <div class="insta-handle"><a href="https://www.instagram.com/bullanseo_o" target="_blank">@bullanseo_o</a></div>
    <p class="insta-bio">신상 안경, 렌즈 소식, 스타일링 팁, 매장 일상까지<br>인스타그램에서 더 많은 이야기를 만나보세요!</p>
    <a href="https://www.instagram.com/bullanseo_o" target="_blank" class="insta-follow-btn">팔로우하기</a>
  </div>
</section>

<footer class="footer">
  <div class="footer-logo">불란서 안경 콘택트</div>
  <div class="footer-links">
    <a href="about.html">소개</a><a href="glasses.html">안경</a><a href="lens.html">렌즈</a><a href="contact.html">오시는 길</a>
  </div>
  <p class="footer-copy">&copy; 2026 France Optical &amp; Contact.</p>
</footer>

<!-- Behold Widget Script -->
<script>
  (() => {
    const d=document,s=d.createElement("script");s.type="module";
    s.src="https://w.behold.so/widget.js";d.head.append(s);
  })();
</script>

<script>
const toggle=document.getElementById('navToggle'),links=document.getElementById('navLinks');
toggle.addEventListener('click',()=>links.classList.toggle('open'));
links.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>links.classList.remove('open')));
document.querySelectorAll('.reveal').forEach(el=>new IntersectionObserver(e=>e.forEach(el=>{if(el.isIntersecting)el.target.classList.add('visible')}),{threshold:0.12}).observe(el));
</script>
</body>
</html>
